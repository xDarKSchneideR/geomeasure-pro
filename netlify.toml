[build]
  command = "npm run build:netlify"
  publish = "dist"

# Ejecutar validación de seguridad en cada deploy
[build.environment]
  NODE_VERSION = "20"

# Fail deploy si la validación falla
[[plugins]]
  package = "@netlify/plugin-lighthouse"

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; connect-src 'self' https://api.render.com https://geomeasure-pro.onrender.com; img-src * ; style-src 'self' 'unsafe-inline'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"